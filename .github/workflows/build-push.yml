# Build and Push Docker Images — E-10 CI Pipeline
# ======================================================================
#
# Trigger: push to main in the application repo (spring-petclinic-microservices)
#   Builds only the services whose directory changed — not all 8 every time.
#
# The build-push workflow:
#   1. dorny/paths-filter detects which service directories changed
#   2. detect-changes builds a JSON array of changed service names
#   3. Dynamic matrix — only services in the array are built
#   4. Docker Buildx + QEMU for linux/arm64 (Graviton) cross compilation
#   5. OIDC auth to AWS (configure-aws-credentials via role assumption)
#   6. Build → Trivy scan → Push → Dispatch to platform repo
#
# The repository_dispatch event (app-image-built) signals the platform repo
# to update its helm-values/ files. ArgoCD then detects the tag change and
# syncs the updated image.  This is the CI-only pipeline — ArgoCD handles CD.
#
# Required secrets (set in GitHub → Settings → Secrets and variables → Actions):
#   AWS_ACCOUNT_ID       — 12-digit, e.g. 478468080326
#   AWS_REGION           — us-east-1
#   AWS_ROLE_ARN          — arn:aws:iam::<account>:role/petclinic-github-actions-build-role
#   PLATFORM_REPO_TOKEN   — GitHub PAT with repo scope (contents:write) on petclinic-platform
#   PLATFORM_REPO         — "amitmaurya001/eks-petclinic-platform" (owner/repo format)

name: Build and Push

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  PLATFORM_REPO: amitmaurya001/eks-petclinic-platform

jobs:
  # ======================================================================
  # Job 1: Detect which services changed
  #   Outputs: changed — JSON array of service names that have changes
  #   e.g. ["admin-server"] when only admin-server/ directory changed
  # ======================================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter-changed.outputs.changed }}

    steps:
      - uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            config-server:
              - 'spring-petclinic-config-server/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            admin-server:
              - 'spring-petclinic-admin-server/**'

      # Build JSON array from filter outputs — only 'true' values
      # become members of the array.
      - id: filter-changed
        run: |
          ITEMS=''
          [ '${{ steps.filter.outputs.config-server }}' = 'true' ] && ITEMS="${ITEMS}\"config-server\","
          [ '${{ steps.filter.outputs.discovery-server }}' = 'true' ] && ITEMS="${ITEMS}\"discovery-server\","
          [ '${{ steps.filter.outputs.api-gateway }}' = 'true' ] && ITEMS="${ITEMS}\"api-gateway\","
          [ '${{ steps.filter.outputs.customers-service }}' = 'true' ] && ITEMS="${ITEMS}\"customers-service\","
          [ '${{ steps.filter.outputs.visits-service }}' = 'true' ] && ITEMS="${ITEMS}\"visits-service\","
          [ '${{ steps.filter.outputs.vets-service }}' = 'true' ] && ITEMS="${ITEMS}\"vets-service\","
          [ '${{ steps.filter.outputs.genai-service }}' = 'true' ] && ITEMS="${ITEMS}\"genai-service\","
          [ '${{ steps.filter.outputs.admin-server }}' = 'true' ] && ITEMS="${ITEMS}\"admin-server\","
          # Strip trailing comma, wrap in brackets
          ITEMS="[${ITEMS%,}]"
          echo "changed=${ITEMS}" >> "$GITHUB_OUTPUT"

  # ======================================================================
  # Job 2: Build and push — one per changed service only
  #   Dynamic matrix: each matrix entry is one changed service
  #   If no services changed, the matrix is empty and the job is automatically skipped
  # ======================================================================
  build:
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.changed) }}

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: petclinic-ci-${{ matrix.service }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        run: |
          SERVICE_DIR="spring-petclinic-${{ matrix.service }}"
          SERVICE_REPO="petclinic-dev/${{ matrix.service }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          ECR_IMAGE="${ECR_REGISTRY}/${SERVICE_REPO}:${SHORT_SHA}"
          ARTIFACT_NAME="spring-petclinic-${{ matrix.service }}-4.0.1"

          echo "Building ${ECR_IMAGE} — platform linux/arm64"

          cp "${SERVICE_DIR}/target/${ARTIFACT_NAME}.jar" "${ARTIFACT_NAME}.jar"

          docker buildx build \
            --file docker/Dockerfile \
            --platform linux/arm64 \
            --build-arg ARTIFACT_NAME=${ARTIFACT_NAME} \
            --provenance=false \
            --load \
            --tag "${ECR_IMAGE}" \
            --build-arg EXPOSED_PORT=${{ fromJSON(
              '{"config-server":"8888","discovery-server":"8761","api-gateway":"8080","customers-service":"8081","visits-service":"8082","vets-service":"8083","genai-service":"8084","admin-server":"9090"}'
            )[matrix.service] }} \
            .

          echo "ecr_image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.build.outputs.ecr_image }}
          exit-code: 1
          severity: CRITICAL
          format: table

      - name: Push to ECR
        if: success()
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          docker push "${ECR_REGISTRY}/petclinic-dev/${{ matrix.service }}:${SHORT_SHA}"
          echo "Pushed: ${ECR_REGISTRY}/petclinic-dev/${{ matrix.service }}:${SHORT_SHA}"

  # ======================================================================
  # Job 3: Fire repository_dispatch to the platform repo
  #   Runs even if build fails — always dispatches the sha + list of
  #   changed services so the platform repo can update helm-values.
  # ======================================================================
  dispatch:
    needs: [detect-changes]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build services list
        id: build_services
        run: |
          # Convert JSON array to space-separated list for client-payload
          # e.g. '"config-server","discovery-server"' -> 'config-server discovery-server'
          CHANGED='${{ needs.detect-changes.outputs.changed }}'
          # Strip brackets
          WITHOUT_BRACKETS="${CHANGED#[}"
          WITHOUT_BRACKETS="${WITHOUT_BRACKETS%]}"
          # Replace escaped quotes with spaces
          SERVICES="${WITHOUT_BRACKETS//\"/ }"
          # Remove commas
          SERVICES="${SERVICES//,/}"
          # Strip leading/trailing whitespace
          SERVICES="${SERVICES# }"
          SERVICES="${SERVICES% }"
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"
          # Also set short SHA
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Fire repository_dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          repository: ${{ vars.PLATFORM_REPO }}
          event-type: app-image-built
          client-payload: |
            {
              "sha": "${{ steps.build_services.outputs.short_sha }}",
              "services": "${{ steps.build_services.outputs.services }}"
            }